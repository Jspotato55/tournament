<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 FLT 브롤스타즈 리그전 🏆</title>
    <style>
        :root {
            --brawl-blue: #0056b3;
            --brawl-yellow: #ffcc00;
            --brawl-dark: #1a1c29;
            --brawl-light: #f0f4f8;
            --matrix-self: #e0e0e0;
        }
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--brawl-dark);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--brawl-light);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: var(--brawl-blue);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            border-bottom: 2px solid var(--brawl-yellow);
            padding-bottom: 5px;
            margin-top: 40px;
        }
        .table-wrapper {
            overflow-x: auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }
        th {
            background-color: var(--brawl-blue);
            color: white;
            font-weight: bold;
            white-space: nowrap;
        }
        
        /* 순위표 스타일 */
        .leaderboard-table tr:hover { background-color: #f9f9f9; }
        .leaderboard-table tr:nth-child(1) td { font-weight: bold; color: #d32f2f; background-color: #fff8e1; }

        /* 대진표(매트릭스) 스타일 */
        .matrix-table th.axis-label {
            background-color: #34495e;
            font-size: 0.85em;
        }
        .matrix-cell {
            padding: 8px 4px;
            min-width: 65px;
        }
        .cell-points {
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            display: block;
        }
        .cell-kills {
            font-size: 0.8em;
            color: #7f8c8d;
            display: block;
            margin-top: 2px;
        }
        .self-cell {
            background-color: var(--matrix-self);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 FLT 브롤스타즈 리그전 🏆</h1>
    
    <section>
        <h2>📊 리그 순위표</h2>
        <div class="table-wrapper">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>플레이어</th>
                        <th>승</th>
                        <th>패</th>
                        <th>승점</th>
                        <th>총 킬 수</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </section>

    <section>
        <h2>⚔️ 9 × 9 풀리그 교차표 (행: 득점자 / 열: 상대)</h2>
        <div class="table-wrapper">
            <table class="matrix-table">
                <thead>
                    <tr id="matrix-header">
                        <th class="axis-label">득점 \ 상대</th>
                    </tr>
                </thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>
    </section>
</div>

<script>
    // [1] 9명의 플레이어 이름 설정 완료
    const playerNames = [
        "태유", "웅희", "재현", "호준", "건아", "보윤", "지승", "의현", "현구"
    ];

    // [2] 요청하신 경기 결과 4건 입력 완료
    // 앞으로 경기 데이터가 쌓이면 아래 양식에 맞추어 이어서 추가하시면 됩니다.
    const matchResults = [
        { p1: "지승", p2: "보윤", winner: "보윤", p1Kills: 0, p2Kills: 2 },
        { p1: "지승", p2: "의현", winner: "의현", p1Kills: 0, p2Kills: 2 },
        { p1: "보윤", p2: "의현", winner: "의현", p1Kills: 0, p2Kills: 1 },
        { p1: "지승", p2: "태유", winner: "태유", p1Kills: 0, p2Kills: 4 }
    ];
    
    // 데이터 구조 초기화
    let players = {};
    let matchMatrix = {};

    playerNames.forEach(p1 => {
        players[p1] = { name: p1, wins: 0, losses: 0, points: 0, kills: 0 };
        matchMatrix[p1] = {};
        playerNames.forEach(p2 => {
            if (p1 === p2) {
                matchMatrix[p1][p2] = { self: true };
            } else {
                matchMatrix[p1][p2] = { points: '-', kills: '-' };
            }
        });
    });

    const leaderboardBody = document.getElementById('leaderboard-body');
    const matrixHeader = document.getElementById('matrix-header');
    const matrixBody = document.getElementById('matrix-body');

    // UI 헤더 초기화
    function initUI() {
        playerNames.forEach(name => {
            matrixHeader.innerHTML += `<th>${name}</th>`;
        });
    }

    // 데이터 계산 로직
    function calculateData() {
        matchResults.forEach(match => {
            const { p1, p2, winner, p1Kills, p2Kills } = match;

            if (players[p1] && players[p2]) {
                players[p1].kills += p1Kills;
                players[p2].kills += p2Kills;

                if (winner === p1) {
                    players[p1].wins += 1;   players[p1].points += 1;
                    players[p2].losses += 1;
                    
                    matchMatrix[p1][p2] = { points: 1, kills: p1Kills };
                    matchMatrix[p2][p1] = { points: 0, kills: p2Kills };
                } else if (winner === p2) {
                    players[p2].wins += 1;   players[p2].points += 1;
                    players[p1].losses += 1;

                    matchMatrix[p1][p2] = { points: 0, kills: p1Kills };
                    matchMatrix[p2][p1] = { points: 1, kills: p2Kills };
                }
            }
        });
    }

    // 1. 순위표 렌더링
    function renderLeaderboard() {
        const sortedPlayers = Object.values(players).sort((a, b) => {
            if (b.points !== a.points) return b.points - a.points;
            return b.kills - a.kills;
        });

        leaderboardBody.innerHTML = sortedPlayers.map((p, index) => `
            <tr>
                <td>${index + 1}</td>
                <td>${p.name}</td>
                <td>${p.wins}</td>
                <td>${p.losses}</td>
                <td><strong>${p.points}</strong></td>
                <td>${p.kills}</td>
            </tr>
        `).join('');
    }

    // 2. 9x9 매트릭스 교차표 렌더링
    function renderMatrix() {
        matrixBody.innerHTML = '';
        
        playerNames.forEach(rowPlayer => {
            let rowHtml = `<tr><td style="background-color:#34495e; color:white; font-weight:bold;">${rowPlayer}</td>`;
            
            playerNames.forEach(colPlayer => {
                const cell = matchMatrix[rowPlayer][colPlayer];
                if (cell.self) {
                    rowHtml += `<td class="self-cell">X</td>`;
                } else {
                    rowHtml += `
                        <td class="matrix-cell">
                            <span class="cell-points">${cell.points}</span>
                            <span class="cell-kills">${cell.kills !== '-' ? cell.kills + ' 킬' : '-'}</span>
                        </td>
                    `;
                }
            });
            
            rowHtml += `</tr>`;
            matrixBody.innerHTML += rowHtml;
        });
    }

    // 초기화 및 실행
    initUI();
    calculateData();
    renderLeaderboard();
    renderMatrix();
</script>

</body>
</html>
